name: Build All Platforms

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths-ignore:
      - "**.md"
      - "开发文档.md"
  push:
    tags:
      - "v*"
  pull_request:
    branches: [main, master]

env:
  # SenseVoice int8 model (~230MB), extracted layout:
  #   sherpa-onnx-sense-voice-.../model.int8.onnx
  #   sherpa-onnx-sense-voice-.../tokens.txt
  MODEL_URL: https://github.com/k2-fsa/sherpa-onnx/releases/download/asr-models/sherpa-onnx-sense-voice-zh-en-ja-ko-yue-int8-2024-07-17.tar.bz2
  MODEL_DIRNAME: sherpa-onnx-sense-voice-zh-en-ja-ko-yue-int8-2024-07-17

jobs:
  # ============================================================
  # Windows: MSI + NSIS installer
  # ============================================================
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Cache SenseVoice model
        id: model-cache
        uses: actions/cache@v4
        with:
          path: src-tauri/models
          key: sensevoice-model-2024-07-17

      - name: Download SenseVoice model
        if: steps.model-cache.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          New-Item -ItemType Directory -Force -Path src-tauri/models | Out-Null
          Write-Host "Downloading model from $env:MODEL_URL"
          curl.exe -L --fail --retry 3 --retry-delay 5 -o model.tar.bz2 "$env:MODEL_URL"
          tar xjf model.tar.bz2
          Copy-Item "$env:MODEL_DIRNAME/model.int8.onnx" src-tauri/models/
          Copy-Item "$env:MODEL_DIRNAME/tokens.txt"      src-tauri/models/
          Remove-Item -Recurse -Force $env:MODEL_DIRNAME
          Remove-Item model.tar.bz2
          Get-ChildItem src-tauri/models

      - name: Install npm dependencies
        run: npm ci

      - name: Build Windows bundle
        run: npm run tauri build

      - name: Upload Windows MSI
        uses: actions/upload-artifact@v4
        with:
          name: VoiceDemo-Windows-MSI
          path: src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: warn

      - name: Upload Windows NSIS (.exe)
        uses: actions/upload-artifact@v4
        with:
          name: VoiceDemo-Windows-NSIS
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: warn

  # ============================================================
  # macOS: DMG for both Apple Silicon (arm64) and Intel (x86_64)
  # ============================================================
  build-macos:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            arch: arm64
            runner: macos-14
          - target: x86_64-apple-darwin
            arch: x86_64
            runner: macos-13
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"
          key: ${{ matrix.target }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Cache SenseVoice model
        id: model-cache
        uses: actions/cache@v4
        with:
          path: src-tauri/models
          key: sensevoice-model-2024-07-17

      - name: Download SenseVoice model
        if: steps.model-cache.outputs.cache-hit != 'true'
        run: |
          set -e
          mkdir -p src-tauri/models
          echo "Downloading model from $MODEL_URL"
          curl -L --fail --retry 3 --retry-delay 5 -o model.tar.bz2 "$MODEL_URL"
          tar xjf model.tar.bz2
          cp "$MODEL_DIRNAME/model.int8.onnx" src-tauri/models/
          cp "$MODEL_DIRNAME/tokens.txt"      src-tauri/models/
          rm -rf "$MODEL_DIRNAME" model.tar.bz2
          ls -lh src-tauri/models

      - name: Install npm dependencies
        run: npm ci

      - name: Build macOS bundle
        run: npm run tauri build -- --target ${{ matrix.target }}

      - name: Upload macOS DMG
        uses: actions/upload-artifact@v4
        with:
          name: VoiceDemo-macOS-${{ matrix.arch }}
          path: src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
          if-no-files-found: warn

      - name: Upload macOS .app (tarred)
        run: |
          cd src-tauri/target/${{ matrix.target }}/release/bundle/macos
          tar czf VoiceDemo-${{ matrix.arch }}.app.tar.gz *.app
        continue-on-error: true

      - name: Upload macOS .app artifact
        uses: actions/upload-artifact@v4
        with:
          name: VoiceDemo-macOS-${{ matrix.arch }}-app
          path: src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app.tar.gz
          if-no-files-found: warn

  # ============================================================
  # Linux: .deb + .AppImage
  # NOTE: Tauri 1.x needs webkit2gtk 4.0 -> pin to ubuntu-22.04
  # ============================================================
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.0-dev \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libasound2-dev \
            patchelf

      - name: Cache SenseVoice model
        id: model-cache
        uses: actions/cache@v4
        with:
          path: src-tauri/models
          key: sensevoice-model-2024-07-17

      - name: Download SenseVoice model
        if: steps.model-cache.outputs.cache-hit != 'true'
        run: |
          set -e
          mkdir -p src-tauri/models
          echo "Downloading model from $MODEL_URL"
          curl -L --fail --retry 3 --retry-delay 5 -o model.tar.bz2 "$MODEL_URL"
          tar xjf model.tar.bz2
          cp "$MODEL_DIRNAME/model.int8.onnx" src-tauri/models/
          cp "$MODEL_DIRNAME/tokens.txt"      src-tauri/models/
          rm -rf "$MODEL_DIRNAME" model.tar.bz2
          ls -lh src-tauri/models

      - name: Install npm dependencies
        run: npm ci

      - name: Build Linux bundle
        run: npm run tauri build

      - name: Upload Linux .deb
        uses: actions/upload-artifact@v4
        with:
          name: VoiceDemo-Linux-deb
          path: src-tauri/target/release/bundle/deb/*.deb
          if-no-files-found: warn

      - name: Upload Linux .AppImage
        uses: actions/upload-artifact@v4
        with:
          name: VoiceDemo-Linux-AppImage
          path: src-tauri/target/release/bundle/appimage/*.AppImage
          if-no-files-found: warn

  # ============================================================
  # Optional: attach all artifacts to a GitHub Release when tag pushed
  # ============================================================
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts
        run: |
          mkdir -p release
          find artifacts -type f \( -name "*.msi" -o -name "*.exe" -o -name "*.dmg" -o -name "*.deb" -o -name "*.AppImage" -o -name "*.app.tar.gz" \) -exec cp {} release/ \;
          ls -la release

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          draft: false
          prerelease: false
          generate_release_notes: true
